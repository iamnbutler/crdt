name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install site dependencies
        run: cd site && bun install

      - name: Build site
        run: bun run site:build

      - name: Assemble Pages artifact
        run: |
          git fetch origin benchmark-data
          git worktree add benchmark-data-worktree benchmark-data
          cp -r benchmark-data-worktree/index.json site/dist/
          cp -r benchmark-data-worktree/results site/dist/
          mv site/dist _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
