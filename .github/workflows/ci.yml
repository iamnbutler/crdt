name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test --test-name-pattern "^(?!.*CRDT Property)"

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for baseline comparison

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download fixtures
        run: bun run fixtures:download

      - name: Run benchmarks
        id: bench
        run: |
          bun run bench:ci > benchmark-results.json
          echo "Benchmark Results:"
          cat benchmark-results.json

      - name: Check for regressions
        if: github.event_name == 'pull_request'
        run: |
          # Download baseline from main branch if it exists
          if git show origin/main:.benchmark-baseline.json > baseline.json 2>/dev/null; then
            echo "Checking against baseline from main branch..."
            cat benchmark-results.json | bun run benchmarks/regression.ts check
          else
            echo "No baseline found on main branch, skipping regression check."
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30

      - name: Store benchmark history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Create benchmark history directory if needed
          mkdir -p .benchmark-history

          # Store results with timestamp
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          cp benchmark-results.json .benchmark-history/results-${TIMESTAMP}.json

          # Update baseline for regression detection
          cp benchmark-results.json .benchmark-baseline.json

          # Keep only last 30 results
          ls -t .benchmark-history/results-*.json | tail -n +31 | xargs -r rm

      - name: Commit benchmark history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update benchmark baseline and history"
          file_pattern: ".benchmark-baseline.json .benchmark-history/*.json"
          skip_dirty_check: false
          commit_options: "--no-verify"
