<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@iamnbutler/crdt — Benchmarks</title>
<style>
/* Catppuccin Latte */
:root {
  --base: #eff1f5;
  --mantle: #e6e9ef;
  --surface0: #ccd0da;
  --surface1: #bcc0cc;
  --text: #4c4f69;
  --subtext0: #6c6f85;
  --subtext1: #5c5f77;
  --red: #d20f39;
  --green: #40a02b;
  --blue: #1e66f5;
  --lavender: #7287fd;
  --mauve: #8839ef;
  --teal: #179299;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace; color: var(--text); background: var(--base); max-width: 1000px; margin: 0 auto; padding: 16px; }
h1 { font-size: 14px; font-weight: bold; margin-bottom: 4px; color: var(--text); }
h2 { font-size: 13px; font-weight: bold; margin: 24px 0 8px; border-bottom: 1px solid var(--surface0); padding-bottom: 4px; color: var(--text); }
h3 { font-size: 12px; font-weight: bold; margin: 16px 0 6px; color: var(--subtext1); }
.meta { color: var(--subtext0); font-size: 11px; margin-bottom: 16px; }
table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 11px; }
th, td { border: 1px solid var(--surface0); padding: 4px 8px; text-align: right; }
th { background: var(--mantle); font-weight: 600; color: var(--subtext1); }
td:first-child, th:first-child { text-align: left; }
.pos { color: var(--green); }
.neg { color: var(--red); }
.bar-cell { width: 200px; white-space: nowrap; }
.bar-wrap { background: var(--surface0); height: 14px; display: inline-block; width: 120px; vertical-align: middle; border-radius: 2px; }
.bar { height: 100%; border-radius: 2px; }
.bar-you { background: var(--mauve); }
.bar-other { background: var(--surface1); }
.bar-label { display: inline-block; margin-left: 6px; font-size: 10px; color: var(--subtext0); vertical-align: middle; }
.hint { color: var(--subtext0); font-size: 10px; font-weight: normal; margin-left: 8px; }
.sparkline { display: block; }
.spark-line { fill: none; stroke: var(--mauve); stroke-width: 1.5; }
.spark-dot { fill: var(--mauve); }
#loading { color: var(--subtext0); }
.err { color: var(--red); }
.run-row:hover { background: var(--mantle); }
.overview-table td { text-align: center; font-size: 10px; }
.overview-table th { font-size: 10px; }
.overview-table .best { background: var(--green); color: white; font-weight: bold; border-radius: 2px; }
.notes { background: var(--mantle); padding: 12px; margin: 12px 0; border-radius: 4px; font-size: 11px; color: var(--subtext0); }
.notes p { margin: 4px 0; }
.notes strong { color: var(--text); }
</style>
</head>
<body>
<h1>@iamnbutler/crdt — Benchmark History</h1>
<div id="loading">Loading...</div>
<div id="root" style="display:none"></div>

<script>
"use strict";

async function main() {
  const loading = document.getElementById("loading");
  const root = document.getElementById("root");

  let index;
  try {
    const r = await fetch("./index.json");
    if (!r.ok) throw new Error(r.status);
    index = await r.json();
  } catch (e) {
    loading.innerHTML = '<span class="err">Failed to load index.json</span>';
    return;
  }

  if (!index.runs?.length) {
    loading.textContent = "No runs yet.";
    return;
  }

  const results = await Promise.all(
    index.runs.slice(0, 30).map(async (run) => {
      try {
        const r = await fetch(`./results/${run.sha}.json`);
        return r.ok ? await r.json() : null;
      } catch { return null; }
    })
  );

  const paired = index.runs
    .slice(0, 30)
    .map((run, i) => ({ meta: run, data: results[i] }))
    .filter(p => p.data?.results && !p.data.results.raw)
    .reverse();

  if (!paired.length) {
    loading.textContent = "No parseable results.";
    return;
  }

  loading.style.display = "none";
  root.style.display = "block";

  const latest = paired[paired.length - 1];
  const ctx = latest.data.results.context;

  let html = `<div class="meta">${paired.length} runs · ${ctx.runtime} ${ctx.version} · ${ctx.arch} · ${ctx.cpu.name}</div>`;

  // Overview table
  html += `<h2>Overview<span class="hint">smaller is better</span></h2>`;
  html += renderOverview(latest);

  // Methodology
  html += `<div class="notes">
    <p><strong>Methodology:</strong> Each benchmark runs multiple iterations until stable. Times shown are averages.</p>
    <p><strong>Libraries:</strong> @iamnbutler/crdt (this project), Loro, Yjs, Automerge — all latest versions at time of run.</p>
    <p><strong>Environment:</strong> ${ctx.cpu.name}, ${ctx.runtime} ${ctx.version}</p>
  </div>`;

  // Latest run details
  html += `<h2>Latest Run (${latest.meta.shortSha})</h2>`;
  html += renderLatestComparison(latest, paired);

  // Historical charts
  html += `<h2>History</h2>`;
  html += renderHistory(paired);

  // Run table
  html += `<h2>Runs</h2>`;
  html += renderRunTable(paired);

  root.innerHTML = html;
}

function renderOverview(latest) {
  const res = latest.data.results;
  const groups = groupBenchmarks(res);

  // Get unique libs and tests
  const libs = ['@iamnbutler/crdt', 'Loro', 'Yjs', 'Automerge'];
  const tests = [];
  const data = new Map();

  for (const [groupName, benches] of groups) {
    if (!groupName) continue;
    tests.push(groupName);
    for (const b of benches) {
      const libName = libs.find(l => b.name.includes(l)) || b.name;
      const key = `${libName}|${groupName}`;
      data.set(key, b.stats.avg);
    }
  }

  let html = `<table class="overview-table"><tr><th></th>`;
  for (const t of tests) {
    const shortName = t.replace(/-/g, ' ').replace('editing trace replay', 'trace replay');
    html += `<th>${shortName}</th>`;
  }
  html += `</tr>`;

  for (const lib of libs) {
    html += `<tr><td style="text-align:left"><b>${lib.replace('@iamnbutler/', '')}</b></td>`;
    for (const t of tests) {
      const key = `${lib}|${t}`;
      const val = data.get(key);
      // Find best (min) for this test
      const testVals = libs.map(l => data.get(`${l}|${t}`)).filter(v => v != null);
      const best = Math.min(...testVals);
      const isBest = val === best;
      html += `<td class="${isBest ? 'best' : ''}">${val ? fmt(val) : '—'}</td>`;
    }
    html += `</tr>`;
  }
  return html + `</table>`;
}

function renderLatestComparison(latest, paired) {
  const res = latest.data.results;
  const groups = groupBenchmarks(res);
  let html = '';

  for (const [groupName, benches] of groups) {
    if (!groupName) continue;
    html += `<h3>${groupName}<span class="hint">smaller is better</span></h3>`;
    html += `<table><tr><th>Benchmark</th><th>avg</th><th>p50</th><th>p99</th><th class="bar-cell">comparison</th><th>vs prev</th></tr>`;

    const maxAvg = Math.max(...benches.map(b => b.stats.avg));

    for (const b of benches) {
      const s = b.stats;
      const barPct = (s.avg / maxAvg * 100).toFixed(1);
      const isYours = b.name.includes('@iamnbutler');

      let delta = '';
      if (paired.length >= 2) {
        const prev = paired[paired.length - 2];
        const prevBench = findBench(prev.data.results, b.name);
        if (prevBench) {
          const pct = ((s.avg - prevBench.stats.avg) / prevBench.stats.avg * 100);
          const cls = pct > 5 ? 'neg' : pct < -5 ? 'pos' : '';
          delta = `<span class="${cls}">${pct > 0 ? '+' : ''}${pct.toFixed(1)}%</span>`;
        }
      }

      html += `<tr>
        <td>${esc(b.name)}</td>
        <td><b>${fmt(s.avg)}</b></td>
        <td>${fmt(s.p50)}</td>
        <td>${fmt(s.p99)}</td>
        <td class="bar-cell"><div class="bar-wrap"><div class="bar ${isYours ? 'bar-you' : 'bar-other'}" style="width:${barPct}%"></div></div><span class="bar-label">${fmt(s.avg)}</span></td>
        <td>${delta}</td>
      </tr>`;
    }
    html += `</table>`;
  }
  return html;
}

function renderHistory(paired) {
  if (paired.length < 2) return '<p>Need more runs for history.</p>';

  const latest = paired[paired.length - 1].data.results;
  const groups = groupBenchmarks(latest);
  let html = '';

  for (const [groupName, benches] of groups) {
    if (!groupName) continue;
    html += `<h3>${groupName}<span class="hint">smaller is better</span></h3>`;
    html += `<table><tr><th>Benchmark</th><th>trend</th><th>min</th><th>max</th><th>current</th></tr>`;

    for (const b of benches) {
      const history = [];
      for (const p of paired) {
        const found = findBench(p.data.results, b.name);
        history.push(found ? found.stats.avg : null);
      }

      const valid = history.filter(v => v !== null);
      if (valid.length === 0) continue;

      const min = Math.min(...valid);
      const max = Math.max(...valid);
      const current = history[history.length - 1];

      html += `<tr>
        <td>${esc(b.name)}</td>
        <td>${renderSparkline(history, 120, 20)}</td>
        <td>${fmt(min)}</td>
        <td>${fmt(max)}</td>
        <td><b>${fmt(current)}</b></td>
      </tr>`;
    }
    html += `</table>`;
  }
  return html;
}

function renderSparkline(data, w, h) {
  const valid = data.map((v, i) => v !== null ? { i, v } : null).filter(Boolean);
  if (valid.length < 2) return '—';

  const min = Math.min(...valid.map(p => p.v));
  const max = Math.max(...valid.map(p => p.v));
  const range = max - min || 1;

  const points = valid.map(p => {
    const x = (p.i / (data.length - 1)) * w;
    const y = h - ((p.v - min) / range) * (h - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });

  const last = valid[valid.length - 1];
  const lastX = (last.i / (data.length - 1)) * w;
  const lastY = h - ((last.v - min) / range) * (h - 4) - 2;

  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline class="spark-line" points="${points.join(' ')}"/>
    <circle class="spark-dot" cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="2"/>
  </svg>`;
}

function renderRunTable(paired) {
  let html = `<table><tr><th>#</th><th>SHA</th><th>Date</th><th>Branch</th><th>Subject</th></tr>`;
  for (let i = paired.length - 1; i >= 0; i--) {
    const m = paired[i].meta;
    const subj = m.subject.length > 50 ? m.subject.slice(0, 47) + '...' : m.subject;
    html += `<tr class="run-row"><td>${paired.length - i}</td><td>${m.shortSha}</td><td>${m.timestamp.slice(0, 10)}</td><td>${esc(m.branch)}</td><td style="text-align:left">${esc(subj)}</td></tr>`;
  }
  return html + `</table>`;
}

function groupBenchmarks(res) {
  const groups = new Map();
  for (const b of res.benchmarks) {
    for (const r of b.runs) {
      const groupName = res.layout[b.group]?.name || null;
      if (!groups.has(groupName)) groups.set(groupName, []);
      groups.get(groupName).push({ name: r.name, stats: r.stats, group: b.group });
    }
  }
  return groups;
}

function findBench(res, name) {
  for (const b of res.benchmarks) {
    for (const r of b.runs) {
      if (r.name === name) return { name: r.name, stats: r.stats };
    }
  }
  return null;
}

function fmt(ns) {
  if (ns == null) return '—';
  if (ns < 1e3) return ns.toFixed(1) + ' ns';
  if (ns < 1e6) return (ns / 1e3).toFixed(1) + ' µs';
  if (ns < 1e9) return (ns / 1e6).toFixed(1) + ' ms';
  return (ns / 1e9).toFixed(2) + ' s';
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

main();
</script>
</body>
</html>
