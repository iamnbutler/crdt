<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@iamnbutler/crdt — Benchmarks</title>
<style>
/* Catppuccin Latte */
:root {
  --base: #eff1f5;
  --mantle: #e6e9ef;
  --surface0: #ccd0da;
  --surface1: #bcc0cc;
  --text: #4c4f69;
  --subtext0: #6c6f85;
  --subtext1: #5c5f77;
  --red: #d20f39;
  --green: #40a02b;
  --blue: #1e66f5;
  --lavender: #7287fd;
  --mauve: #8839ef;
  --teal: #179299;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font: 12px / 1.5 ui-monospace, "SF Mono", Menlo, monospace;
  color: var(--text);
  background: var(--base);
  max-width: 1000px;
  margin: 0 auto;
  padding: 16px;
}

h1 {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 4px;
  color: var(--text);
}
h2 {
  font-size: 13px;
  font-weight: bold;
  margin: 24px 0 8px;
  border-bottom: 1px solid var(--surface0);
  padding-bottom: 4px;
  color: var(--text);
}
h3 {
  font-size: 12px;
  font-weight: bold;
  margin: 16px 0 6px;
  color: var(--subtext1);
}

.meta {
  color: var(--subtext0);
  font-size: 11px;
  margin-bottom: 16px;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin: 8px 0;
  font-size: 11px;
}
th,
td {
  border: 1px solid var(--surface0);
  padding: 4px 8px;
  text-align: right;
}
th {
  background: var(--mantle);
  font-weight: 600;
  color: var(--subtext1);
}
td:first-child,
th:first-child {
  text-align: left;
}

.pos {
  color: var(--green);
}
.neg {
  color: var(--red);
}

.bar-cell {
  width: 200px;
  white-space: nowrap;
}
.bar-wrap {
  background: var(--surface0);
  height: 14px;
  display: inline-block;
  width: 120px;
  vertical-align: middle;
  border-radius: 2px;
}
.bar {
  height: 100%;
  border-radius: 2px;
}
.bar-you {
  background: var(--mauve);
}
.bar-other {
  background: var(--surface1);
}
.bar-label {
  display: inline-block;
  margin-left: 6px;
  font-size: 10px;
  color: var(--subtext0);
  vertical-align: middle;
}

.hint {
  color: var(--subtext0);
  font-size: 10px;
  font-weight: normal;
  margin-left: 8px;
}

.sparkline {
  display: block;
}
.spark-line {
  fill: none;
  stroke: var(--mauve);
  stroke-width: 1.5;
}
.spark-dot {
  fill: var(--mauve);
}

#loading {
  color: var(--subtext0);
}
.err {
  color: var(--red);
}

.run-row:hover {
  background: var(--mantle);
}

.overview-table td {
  text-align: center;
  font-size: 10px;
}
.overview-table th {
  font-size: 10px;
}
.overview-table .best {
  background: var(--green);
  color: white;
  font-weight: bold;
  border-radius: 2px;
}

.notes {
  background: var(--mantle);
  padding: 12px;
  margin: 12px 0;
  border-radius: 4px;
  font-size: 11px;
  color: var(--subtext0);
}
.notes p {
  margin: 4px 0;
}
.notes strong {
  color: var(--text);
}

</style>
</head>
<body>
<h1>@iamnbutler/crdt — Benchmark History</h1>
<div id="loading">Loading...</div>
<div id="root" style="display:none"></div>
<script>
function m(t){if(t==null)return"—";if(t<1000)return`${t.toFixed(1)} ns`;if(t<1e6)return`${(t/1000).toFixed(1)} µs`;if(t<1e9)return`${(t/1e6).toFixed(1)} ms`;return`${(t/1e9).toFixed(2)} s`}function g(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}var $=["@iamnbutler/crdt","Loro","Yjs","Automerge"];function v(t){let a=new Map;for(let r of t.benchmarks)for(let e of r.runs){let s=t.layout[r.group]?.name||null;if(!a.has(s))a.set(s,[]);a.get(s)?.push({name:e.name,stats:e.stats,group:r.group})}return a}function x(t,a){for(let r of t.benchmarks)for(let e of r.runs)if(e.name===a)return{name:e.name,stats:e.stats,group:r.group};return null}function y(t){let a=t.data.results,r=v(a),e=[],s=new Map;for(let[l,o]of r){if(!l)continue;e.push(l);for(let n of o){let i=$.find((d)=>n.name.includes(d))||n.name;s.set(`${i}|${l}`,n.stats.avg)}}let c='<table class="overview-table"><tr><th></th>';for(let l of e){let o=l.replace(/-/g," ").replace("editing trace replay","trace replay");c+=`<th>${o}</th>`}c+="</tr>";for(let l of $){c+=`<tr><td style="text-align:left"><b>${l.replace("@iamnbutler/","")}</b></td>`;for(let o of e){let n=s.get(`${l}|${o}`),i=$.map((h)=>s.get(`${h}|${o}`)).filter((h)=>h!=null),d=Math.min(...i);c+=`<td class="${n===d?"best":""}">${n?m(n):"—"}</td>`}c+="</tr>"}return`${c}</table>`}function R(t,a){let r=t.data.results,e=v(r),s="";for(let[c,l]of e){if(!c)continue;s+=`<h3>${c}<span class="hint">smaller is better</span></h3>`,s+='<table><tr><th>Benchmark</th><th>avg</th><th>p50</th><th>p99</th><th class="bar-cell">comparison</th><th>vs prev</th></tr>';let o=Math.max(...l.map((n)=>n.stats.avg));for(let n of l){let i=n.stats,d=(i.avg/o*100).toFixed(1),u=n.name.includes("@iamnbutler"),h="";if(a.length>=2){let p=a[a.length-2],b=x(p.data.results,n.name);if(b){let f=(i.avg-b.stats.avg)/b.stats.avg*100;h=`<span class="${f>5?"neg":f<-5?"pos":""}">${f>0?"+":""}${f.toFixed(1)}%</span>`}}s+=`<tr>
        <td>${g(n.name)}</td>
        <td><b>${m(i.avg)}</b></td>
        <td>${m(i.p50)}</td>
        <td>${m(i.p99)}</td>
        <td class="bar-cell"><div class="bar-wrap"><div class="bar ${u?"bar-you":"bar-other"}" style="width:${d}%"></div></div><span class="bar-label">${m(i.avg)}</span></td>
        <td>${h}</td>
      </tr>`}s+="</table>"}return s}function M(t,a,r){let e=t.map((u,h)=>u!==null?{i:h,v:u}:null).filter((u)=>u!==null);if(e.length<2)return"—";let s=Math.min(...e.map((u)=>u.v)),l=Math.max(...e.map((u)=>u.v))-s||1,o=e.map((u)=>{let h=u.i/(t.length-1)*a,p=r-(u.v-s)/l*(r-4)-2;return`${h.toFixed(1)},${p.toFixed(1)}`}),n=e[e.length-1],i=n.i/(t.length-1)*a,d=r-(n.v-s)/l*(r-4)-2;return`<svg class="sparkline" width="${a}" height="${r}" viewBox="0 0 ${a} ${r}">
    <polyline class="spark-line" points="${o.join(" ")}"/>
    <circle class="spark-dot" cx="${i.toFixed(1)}" cy="${d.toFixed(1)}" r="2"/>
  </svg>`}function w(t){if(t.length<2)return"<p>Need more runs for history.</p>";let a=t[t.length-1].data.results,r=v(a),e="";for(let[s,c]of r){if(!s)continue;e+=`<h3>${s}<span class="hint">smaller is better</span></h3>`,e+="<table><tr><th>Benchmark</th><th>trend</th><th>min</th><th>max</th><th>current</th></tr>";for(let l of c){let o=[];for(let h of t){let p=x(h.data.results,l.name);o.push(p?p.stats.avg:null)}let n=o.filter((h)=>h!==null);if(n.length===0)continue;let i=Math.min(...n),d=Math.max(...n),u=o[o.length-1];e+=`<tr>
        <td>${g(l.name)}</td>
        <td>${M(o,120,20)}</td>
        <td>${m(i)}</td>
        <td>${m(d)}</td>
        <td><b>${m(u)}</b></td>
      </tr>`}e+="</table>"}return e}function B(t){let a="<table><tr><th>#</th><th>SHA</th><th>Date</th><th>Branch</th><th>Subject</th></tr>";for(let r=t.length-1;r>=0;r--){let e=t[r].meta,s=e.subject.length>50?`${e.subject.slice(0,47)}...`:e.subject;a+=`<tr class="run-row"><td>${t.length-r}</td><td>${e.shortSha}</td><td>${e.timestamp.slice(0,10)}</td><td>${g(e.branch)}</td><td style="text-align:left">${g(s)}</td></tr>`}return`${a}</table>`}function j(t){return`<div class="notes">
    <p><strong>Methodology:</strong> Each benchmark runs multiple iterations until stable. Times shown are averages.</p>
    <p><strong>Libraries:</strong> @iamnbutler/crdt (this project), Loro, Yjs, Automerge — all latest versions at time of run.</p>
    <p><strong>Environment:</strong> ${t.cpu.name}, ${t.runtime} ${t.version}</p>
  </div>`}async function k(){let t=document.getElementById("loading"),a=document.getElementById("root");if(!t||!a)return;let r;try{let n=await fetch("./index.json");if(!n.ok)throw Error(String(n.status));r=await n.json()}catch{t.innerHTML='<span class="err">Failed to load index.json</span>';return}if(!r.runs?.length){t.textContent="No runs yet.";return}let e=await Promise.all(r.runs.slice(0,30).map(async(n)=>{try{let i=await fetch(`./results/${n.sha}.json`);return i.ok?await i.json():null}catch{return null}})),s=r.runs.slice(0,30).map((n,i)=>({meta:n,data:e[i]??null})).filter((n)=>n.data?.results!=null&&!n.data.results.raw).reverse();if(!s.length){t.textContent="No parseable results.";return}t.style.display="none",a.style.display="block";let c=s[s.length-1],l=c.data.results.context,o=`<div class="meta">${s.length} runs · ${l.runtime} ${l.version} · ${l.arch} · ${l.cpu.name}</div>`;o+='<h2>Overview<span class="hint">smaller is better</span></h2>',o+=y(c),o+=j(l),o+=`<h2>Latest Run (${c.meta.shortSha})</h2>`,o+=R(c,s),o+="<h2>History</h2>",o+=w(s),o+="<h2>Runs</h2>",o+=B(s),a.innerHTML=o}k();

</script>
</body>
</html>
